<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXIMUS MX | v3.1 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dash-v3">
    <div class="glow-bg"></div>
    
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-ghost"></i>
            <span>MAXIMUS<span>MX</span></span>
        </div>
        <div class="version">CORE v3.1</div>
        <nav>
            <a href="#" class="active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="#" class="disabled"><i class="fa-solid fa-users"></i> Usuarios</a>
            <a href="#" class="disabled"><i class="fa-solid fa-server"></i> Servicios</a>
            <a href="#" class="disabled"><i class="fa-solid fa-gear"></i> Ajustes</a>
        </nav>
        <div class="status-box">
            <div class="indicator"><span class="dot" id="stream-dot"></span> <span id="stream-text">Conectando...</span></div>
            <div class="server-ip" id="display-ip">0.0.0.0</div>
        </div>
    </aside>

    <main class="content">
        <header>
            <h1>Dashboard Principal</h1>
            <div class="uptime">Uptime: <span id="val-uptime">--</span></div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <div class="card-head"><span>CPU LOAD</span><i class="fa-solid fa-microchip"></i></div>
                <div class="card-body">
                    <div class="val" id="val-cpu">0%</div>
                    <div class="sub" id="val-cpu-detail">-- cores · --</div>
                </div>
                <div class="progress-bar"><div class="fill" id="fill-cpu" style="width:0%"></div></div>
            </div>

            <div class="card">
                <div class="card-head"><span>RAM</span><i class="fa-solid fa-memory"></i></div>
                <div class="card-body">
                    <div class="val" id="val-ram">0%</div>
                    <div class="sub" id="val-ram-detail">-- / -- MB</div>
                </div>
                <div class="progress-bar"><div class="fill" id="fill-ram" style="width:0%"></div></div>
            </div>

            <div class="card">
                <div class="card-head"><span>DISCO</span><i class="fa-solid fa-hard-drive"></i></div>
                <div class="card-body">
                    <div class="val" id="val-disk">0%</div>
                    <div class="sub" id="val-disk-detail">-- / --</div>
                </div>
                <div class="progress-bar"><div class="fill" id="fill-disk" style="width:0%"></div></div>
            </div>

            <div class="card highlight">
                <div class="card-head"><span>ONLINE</span><i class="fa-solid fa-wifi"></i></div>
                <div class="card-body">
                    <div class="val big" id="val-online">0</div>
                    <div class="sub">Total: <span id="val-users">0</span> cuentas</div>
                </div>
            </div>
        </div>

        <div class="charts-area">
            <div class="chart-box">
                <h3>Monitor de Recursos</h3>
                <canvas id="mainChart"></canvas>
            </div>
            <div class="info-box">
                <h3>Información de Red</h3>
                <div class="net-row">
                    <div class="net-item down">
                        <i class="fa-solid fa-download"></i>
                        <span>Descarga</span>
                        <div id="val-rx">0 GB</div>
                    </div>
                    <div class="net-item up">
                        <i class="fa-solid fa-upload"></i>
                        <span>Subida</span>
                        <div id="val-tx">0 GB</div>
                    </div>
                </div>
                <div class="sys-info">
                    <div class="line"><span>Host:</span> <span id="val-host">--</span></div>
                    <div class="line"><span>Kernel:</span> <span id="val-kernel">--</span></div>
                    <div class="line"><span>OS:</span> <span id="val-os">--</span></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
