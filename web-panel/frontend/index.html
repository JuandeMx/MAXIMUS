<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXIMUS ELITE | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">MAX<span>MX</span></div>
        <nav>
            <a href="#" class="nav-item active" onclick="switchTab('dashboard')">
                <i class="fa-solid fa-gauge-high"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" onclick="switchTab('users')">
                <i class="fa-solid fa-users"></i> <span>Usuarios</span>
            </a>
            <a href="#" class="nav-item" onclick="switchTab('services')">
                <i class="fa-solid fa-server"></i> <span>Servicios</span>
            </a>
            <a href="#" class="nav-item" onclick="switchTab('generator')">
                <i class="fa-solid fa-plus-circle"></i> <span>Generador</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
        </div>
    </div>

    <main class="content">
        <header class="top-bar">
            <h2 id="pageTitle">Dashboard</h2>
            <div class="uptime-badge">
                <i class="fa-solid fa-clock"></i> <span id="uptime-val">Cargando...</span>
            </div>
        </header>

        <!-- DASHBOARD TAB -->
        <section id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <label>CPU LOAD</label>
                        <h3 id="cpu-val">0%</h3>
                    </div>
                    <div class="stat-icon"><i class="fa-solid fa-microchip"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <label>RAM USAGE</label>
                        <h3 id="ram-val">0 / 0 MB</h3>
                    </div>
                    <div class="stat-icon"><i class="fa-solid fa-memory"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <label>DISK SPACE</label>
                        <h3 id="disk-val">0%</h3>
                    </div>
                    <div class="stat-icon"><i class="fa-solid fa-hard-drive"></i></div>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-info">
                        <label>ONLINES</label>
                        <h3 id="online-val">0</h3>
                    </div>
                    <div class="stat-icon"><i class="fa-solid fa-wifi"></i></div>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-container">
                    <h4>Consumo de Recursos</h4>
                    <canvas id="resourceChart"></canvas>
                </div>
            </div>
        </section>

        <!-- USERS TAB -->
        <section id="tab-users" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>Listado de Usuarios</h3>
                    <div class="search-box">
                        <input type="text" placeholder="Buscar usuario...">
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Tipo</th>
                                <th>Vencimiento</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="userListBody">
                            <!-- Inyectado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- SERVICES TAB -->
        <section id="tab-services" class="tab-content">
            <div class="services-grid" id="servicesGrid">
                <!-- Inyectado por JS -->
            </div>
        </section>

        <!-- GENERATOR TAB -->
        <section id="tab-generator" class="tab-content">
            <div class="generator-container">
                <div class="card gen-card" onclick="openGen('ssh')">
                    <i class="fa-solid fa-shield"></i>
                    <h4>SSH / SSL</h4>
                </div>
                <div class="card gen-card" onclick="openGen('hysteria')">
                    <i class="fa-solid fa-bolt"></i>
                    <h4>Hysteria v2</h4>
                </div>
            </div>
        </section>

    </main>

    <!-- Modal Gen -->
    <div id="genModal" class="modal">
        <div class="modal-content">
            <h2 id="genTitle">Crear Cuenta</h2>
            <form id="genForm">
                <input type="hidden" id="genType">
                <input type="text" id="genUser" placeholder="Usuario" required>
                <input type="password" id="genPass" placeholder="Contraseña" required>
                <button type="submit">GENERAR AHORA</button>
                <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
