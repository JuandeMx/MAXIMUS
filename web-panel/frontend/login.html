<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Maximus Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #06b6d4;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated bg */
        .bg-glow-1 {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            top: -150px; right: -150px;
            filter: blur(100px);
            animation: drift 15s infinite ease-in-out;
        }
        .bg-glow-2 {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            filter: blur(100px);
            animation: drift 20s infinite ease-in-out reverse;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(24px);
            padding: 48px 40px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
        }
        .brand-icon-lg {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
        }
        .brand-name {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-name span { color: var(--primary); }
        .login-subtitle {
            color: #475569;
            font-size: 0.85rem;
            margin-bottom: 36px;
            padding-left: 64px;
        }

        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap i {
            position: absolute;
            left: 16px;
            color: #475569;
            font-size: 0.9rem;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            padding: 14px 16px 14px 46px;
            border-radius: 12px;
            color: white;
            font-size: 0.92rem;
            outline: none;
            transition: border 0.25s;
            font-family: inherit;
        }
        .input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #0891b2);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(6, 182, 212, 0.3);
        }
        .login-btn:active { transform: translateY(0); }

        .error-msg {
            color: #ef4444;
            font-size: 0.82rem;
            margin-top: 16px;
            text-align: center;
            display: none;
            font-weight: 500;
        }
        .error-msg i { margin-right: 6px; }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon-lg"><i class="fa-solid fa-ghost"></i></div>
            <div class="brand-name">MAXIMUS<span>MX</span></div>
        </div>
        <p class="login-subtitle">Panel de Control Elite</p>

        <form id="loginForm">
            <div class="field">
                <label>Usuario</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="admin" required autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                INGRESAR <i class="fa-solid fa-arrow-right"></i>
            </button>
            <div id="errorMessage" class="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i> Credenciales incorrectas
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMessage');
            err.style.display = 'none';

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Acceso concedido!';
                    btn.style.background = '#10b981';
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    err.style.display = 'block';
                    btn.innerHTML = 'INGRESAR <i class="fa-solid fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                err.innerText = 'Error de conexión con el servidor';
                err.style.display = 'block';
                btn.innerHTML = 'INGRESAR <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
